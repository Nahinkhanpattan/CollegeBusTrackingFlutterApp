name: college_bus_tracker
description: A comprehensive college bus tracking system with role-based access control.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  go_router: ^12.1.3
  
  # Utilities
  email_validator: ^2.1.17
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  flutter_local_notifications: ^16.3.0
  
  # HTTP & Networking
  http: ^1.1.2
  
  # OTP
  pinput: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700